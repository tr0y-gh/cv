<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cv</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="page-wrapper">
    <header id="print-header" class="print">
      <div class="container">
        <p></p>
      </div>
    </header>
    <header id="page-header" class="no-print">
      <a href="#main" id="skip-link">Skip to content</a>
      <div class="container">
        <nav class="flex">
          <ul class="nav unstyled flex flex-1">
            <li></li>
          </ul>
          <ul class="unstyled flex">
            <li>
              <select id="theme">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </li>
            <li>
              <select id="lang">
                <option value="en">English</option>
                <option value="se">Svenska</option>
              </select>
            </li>
            <li>
              <button id="print" onclick="window.print()">Print / Save PDF</button>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <div id="page-content">
      <div class="container">
        <main id="main"></main>
      </div>
    </div><!-- #page-content -->
  </div><!-- #page-wrapper -->
  <script type="module" src="script.js"></script>
</body>
</html>
